<style>
:root {
  --bg:#f7f4ee; --paper:#fffdf8; --ink:#1f2937; --muted:#697386; --line:#e7ded1;

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(135deg,#fbfaf7,#f1ebe2);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.72}
header{position:sticky;top:0;z-index:50;background:rgba(255,253,248,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:16px 22px}

.prompt-line{background:#faf7f1;border:1px solid var(--line);padding:10px;border-radius:12px}

.q{border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;background:#fff}
.choice{display:block;margin:8px 0;padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:#fbfaf7;cursor:pointer}
.choice input{width:auto;margin-right:8px} .feedback{padding:10px;border-radius:12px;margin-top:8px} .ok{background:#dcfce7;color:var(--good)} .no{background:#fee2e2;color:var(--bad)}
textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;min-height:46px} textarea{min-height:110px}
label{font-weight:800;display:block;margin:.9rem 0 .25rem} .searchbox{margin:10px 0 14px}

@media(max-width:900px){

  main{height:auto;overflow:visible;padding:14px} .panel-toolbar{position:relative;margin:-14px -14px 14px;padding:12px 14px;align-items:flex-start;flex-direction:column}
  .card{padding:16px} .hero{padding:22px}
}
@media(max-width:520px){nav{grid-template-columns:1fr} .controls{align-items:stretch} button,select{width:100%}}
@media print{
  header,nav,.controls,.panel-toolbar,.no-print{display:none!important}
  .layout{display:block} main{height:auto;overflow:visible;padding:0} main>section{display:block!important}
  .card{box-shadow:none;border:0;break-inside:avoid} body{background:white}
}

<script>
const APP_DATA = {"en":{"ui":{"course":"Understanding the Bible","week":"Week 15 — Revelation & New Testament Canonical Synthesis","title":"Unveiling Empire, Forming Endurance, Making All Things New","eyebrow":"Pre-Class Adaptive Learning · UB Week 15","tagline":"How does the slaughtered Lamb form a witnessing people within Babylon while New Jerusalem descends?","heroClaim":"Revelation unveils first-century empire, forms costly endurance, and completes the New Testament movement from kingdom inauguration to cosmic renewal.","formationAim":"Read Revelation as apocalypse, prophecy, and letter for real churches facing persecution and assimilation, then synthesize the canonical arc through embodied witness.","method":"Begin inside the text-world: first-century Asia Minor, imperial cult economics, Danielic imagery, and the Lamb's cruciform victory. Move through WHERE–WHO–WHAT to EMBODIED practice.","threshold":"Carry one unveiling of Babylon, one vision of the Lamb, one canonical movement, and one concrete practice of hypomonē into Active Learning.","formationAimTitle":"Formation Aim","methodTitle":"Core Method","thresholdTitle":"Threshold Output","stats":{"parts":9,"coreTexts":10,"scholars":7,"glossary":18},"statLabels":["Learning Panels","Core Texts","Scholar Voices","Glossary Terms"],"navKicker":"Adaptive Learning","navHelp":"Read one panel at a time. Exegesis precedes hermeneutics.","prev":"Previous","next":"Next","mark":"Mark Panel Read","print":"Print / Save PDF","reset":"Reset","complete":"complete","coreTextSet":"Core Text Set","tuesday":"Tuesday · Revelation","friday":"Friday · Canonical Synthesis","exe":"Exegetical Question","her":"Hermeneutical Question","integration":"Integration Question","model":"Model Movement Sentence","grade":"Grade Quiz","correct":"Correct. ","review":"Review: ","score":"Score","reflectionTitle":"Threshold Reflection","reflectionHelp":"Write what you will carry into Active Learning.","r1":"One unveiling of Babylon","r2":"One tension between Lion and Lamb","r3":"One unresolved canonical question","r4":"One embodied practice of witness or endurance","submitTitle":"Submit / Export","submitHelp":"Export locally or print to PDF for submission.","student":"Student Name","sid":"Student ID","class":"Class","export":"Export Reflection JSON","copy":"Copy JSON","placeholder":"Export output appears here","search":"Search glossary","quizHelp":"Use this as a pre-class self-check.","footer":"UB Week 15 Adaptive Learning · Revelation & Canonical Synthesis · Joshua Kim"},"modules":[{"id":"landing","label":"Landing","subtitle":"Orientation and formation aim"},{"id":"overview","label":"Overview","subtitle":"Part 1 · Dual Tuesday/Friday architecture"},{"id":"context","label":"Historical & Literary","subtitle":"Part 2 · Domitian, imperial cult, apocalypse"},{"id":"emic","label":"WHERE · WHO · WHAT","subtitle":"Part 3 · Two cities, Lamb identity, faithful witness"},{"id":"themes","label":"Major Themes","subtitle":"Part 4 · Sovereignty, endurance, renewal"},{"id":"canonical","label":"Comparative & Canonical","subtitle":"Part 5 · Genesis, Paul, state power"},{"id":"scholars","label":"Scholar Matrix","subtitle":"Part 6 · Seven voices in productive tension"},{"id":"logic","label":"Internal Logic","subtitle":"Part 7 · Recapitulation and four canonical movements"},{"id":"texts","label":"Core Texts","subtitle":"Tuesday 5 texts · Friday 5 texts"},{"id":"synthesis","label":"Formation & Conclusion","subtitle":"WHERE → WHO → WHAT → EMBODIED"},{"id":"glossary","label":"Glossary","subtitle":"Key terms for Week 15"},{"id":"quiz","label":"Quiz","subtitle":"Self-assessment before class"},{"id":"reflection","label":"Reflection","subtitle":"Threshold into Active Learning"},{"id":"submit","label":"Submit / Export","subtitle":"Local export and Print/PDF"}],"moduleHtml":{"overview":"<h3>1. WEEK OVERVIEW</h3><p>Week 15 is the final canonical threshold. Tuesday reads the Apocalypse of John as immediate pastoral literature for seven first-century churches. Friday steps back to synthesize the New Testament as four movements: Kingdom inauguration in the Gospels, Spirit-driven expansion in Acts, cruciform community formation in the Epistles, and cosmic consummation in Revelation.</p><h4>The Dual Crisis</h4><p>Smyrna and Pergamum face harassment, exclusion, and martyrdom. Sardis and Laodicea face the quieter danger of comfort and assimilation. The same apocalyptic unveiling consoles the persecuted and diagnoses the comfortable.</p><div class='text-card'><strong>EMBODIED:</strong> Name the economic, ideological, digital, or institutional system that currently asks for your ultimate loyalty.</div>","context":"<h3>2. HISTORICAL AND LITERARY CONTEXT</h3><h4>Patmos and Domitian</h4><p>Revelation is commonly dated to AD 92–96. John writes from Patmos as a brother sharing persecution, kingdom, and patient endurance. The authorship debate between apostolic tradition and John the Seer matters, but the text grounds authority in vision, testimony, and shared suffering.</p><h4>Imperial Cult Economics</h4><p>In Asia Minor, emperor veneration, civic honor, and trade-guild participation were intertwined. Refusal could mean boycott and shame. The beast's mark symbolizes participation conditioned on allegiance to Caesar, not a modern microchip.</p><h4>Hybrid Genre</h4><p>Revelation is apocalypse, prophecy, and epistle. Its imagery inhabits Daniel, Ezekiel, Isaiah, Zechariah, and Exodus. Literalistic decoding destroys this symbolic world.</p>","emic":"<h3>3. EMIC RECONSTRUCTION</h3><h4>WHERE — Babylon and New Jerusalem</h4><p>An open door lifts John into the throne-room perspective. Rome is unmasked as Babylon; New Jerusalem descends rather than receiving escapees. Heaven heals earth.</p><h4>WHO — The Ones Who Conquer</h4><p>The Lion is seen as a Lamb standing as slaughtered. Believers conquer in the same pattern: the Lamb's blood, truthful testimony, and non-clinging to survival.</p><h4>WHAT — Hypomonē, Martyria, Apokalypsis</h4><p>Patient endurance is active resistance; testimony is costly truth-telling; apocalypse is disclosure of what is already true.</p><div class='text-card'><strong>EMBODIED:</strong> Identify one concrete refusal through which your allegiance to the Lamb becomes visible.</div>","themes":"<h3>4. MAJOR THEMES</h3><h4>God and the Lamb's Sovereignty</h4><p>Caesar's power is exposed as parody. The Lamb conquers through self-giving suffering.</p><h4>Witness and Endurance</h4><p>Revelation does not train date calculation. It forms martyria and hypomonē.</p><h4>Judgment toward Renewal</h4><p>The seals, trumpets, and bowls dismantle oppressive power so that death, mourning, crying, and pain can end.</p><h4>Canonical Kingdom Movement</h4><p>Gospels inaugurate, Acts expands, Epistles form, and Revelation consummates the Kingdom of God.</p>","canonical":"<h3>5. COMPARATIVE AND CANONICAL RELATIONSHIPS</h3><h4>Genesis and Revelation</h4><p>The serpent is defeated, the curse removed, and the tree of life restored. Paradise is not merely recovered; creation becomes a city-garden where God dwells with humanity.</p><h4>Paul and John</h4><p>Paul argues that power is perfected in weakness; John shows the Lion as the slaughtered Lamb. Argument and vision require each other.</p><h4>Romans 13 and Revelation 13</h4><p>Government may restrain chaos, but when the state demands worship, submission reaches its theological limit and faithful resistance begins.</p>","scholars":"<h4>Productive Tensions</h4><p>Brown anchors what Revelation meant; deSilva asks what its rhetoric did. Wright and Bird stress political-covenantal renewal; Johnson stresses pastoral formation. Ehrman preserves historical trauma and diversity; Carson and Moo preserve the text's apostolic and canonical claim. Green connects the whole movement through God's narrative plan.</p>","logic":"<h3>7. INTERNAL LOGIC</h3><p>Revelation is not a linear end-times chart. The seven seals, trumpets, and bowls progressively recapitulate the same conflict from deepening perspectives. Chapters 1–3 establish earthly crisis; 4–5 establish the throne and Lamb; 6–16 unveil judgment; 17–19 expose and defeat Babylon; 21–22 disclose renewed creation.</p><h4>Canonical Logic</h4><p>Gospels: centripetal incarnation. Acts: centrifugal Spirit mission. Epistles: formational community. Revelation: eschatological and cosmic resolution.</p>","texts":"<h3>8. CORE TEXT SET</h3><p>Tuesday enters Revelation's own world. Friday traces the canonical movement that Revelation completes. Work from exegesis to hermeneutics through integration.</p>","synthesis":"<h3>9. THEOLOGICAL–FORMATIONAL SYNTHESIS</h3><p>Revelation forms a community of absolute allegiance that lives as an outpost of New Jerusalem within Babylon. It refuses both violent retaliation and comfortable assimilation.</p><h4>Justice Audit from the Seven Churches</h4><p><strong>CLOSED WOMB:</strong> imperial structures bury Smyrna and Philadelphia's disclosed dignity. <strong>PREMATURE EXPULSION:</strong> Nicolaitan and Jezebel voices force identity into idolatrous systems. <strong>KAIROS THEFT:</strong> Laodicean wealth substitutes imperial comfort for formation.</p><h4>Final Formation</h4><p>The canon forms people who embody Gospel mercy, Acts courage, Epistle cruciform love, and Revelation hope. The canon is closed; the mission continues.</p><div class='text-card'><strong>EMBODIED:</strong> Bring truthful testimony, not a lecture, to one suffering or complacent relational field this week.</div>"},"coreTexts":[{"day":"Tuesday","n":1,"ref":"Revelation 1:9–20","exegetical":"How does John repurpose Daniel 7 imagery to establish the divine authority of the risen Christ over exile on Patmos?","hermeneutical":"How must a suffering church recalibrate its vision of Jesus from moral teacher to sovereign Lord of history?","integration":"How does Brown's first-century setting under Domitian prevent this vision from becoming a distant-future timetable?","model":"Within Domitian's imperial world, the Son of Man vision is an immediate pastoral unveiling that assures an exiled church that Christ, not Caesar, rules history."},{"day":"Tuesday","n":2,"ref":"Revelation 4:1–11","exegetical":"How does John's elevation through an open heavenly door relativize Rome's apparent omnipotence?","hermeneutical":"How can corporate worship become a subversive act of allegiance amid political and economic superpowers?","integration":"How does the throne-room scene embody Johnson's lived faith by aligning earthly liturgy with heavenly worship?","model":"The throne-room perspective forms worship as lived resistance, revealing that every earthly empire is derivative and sovereignty belongs to the Creator."},{"day":"Tuesday","n":3,"ref":"Revelation 5:1–14","exegetical":"How does the Lamb standing as slaughtered redefine conquering (nikaō) through the permanent wounds of crucifixion?","hermeneutical":"How does cruciform victory challenge Christian attraction to coercive political power?","integration":"How does John's symbolic Lion/Lamb vision translate Paul's theology of power perfected in weakness?","model":"The permanently wounded Lamb translates the theology of the cross into apocalyptic vision: God conquers systemic evil through self-giving love, not coercive violence."},{"day":"Tuesday","n":4,"ref":"Revelation 12:1–12","exegetical":"How do the woman, child, wilderness, and dragon disclose the cosmic dimension of the church's earthly suffering?","hermeneutical":"How does victory by the Lamb's blood and faithful testimony require nonviolent prophetic witness rather than retaliation?","integration":"How does deSilva illuminate the economic and civic pressure placed on believers who refused imperial cult participation?","model":"The cosmic conflict names the social reality of imperial pressure, while the saints overcome through the Lamb's accomplished victory and costly, nonviolent testimony."},{"day":"Tuesday","n":5,"ref":"Revelation 21:1–6","exegetical":"How does New Jerusalem coming down from heaven subvert escape into a disembodied afterlife?","hermeneutical":"How does God's dwelling on renewed earth demand ecological stewardship and social justice now?","integration":"How does this descent complete Wright's covenantal kingdom narrative and Abrahamic promise of blessing?","model":"The descending city completes the kingdom story by joining heaven and renewed earth, forming the church to anticipate material and relational restoration now."},{"day":"Friday","n":6,"ref":"Luke 4:16–21","exegetical":"How do Isaiah 61 and 58 establish Jubilee as the program of Jesus' ministry and Luke-Acts?","hermeneutical":"How must the church evaluate complicity in structures that perpetuate poverty and marginalization?","integration":"How does Green's boule tou theou connect the Nazareth manifesto to the margins and New Jerusalem?","model":"The Nazareth manifesto inaugurates a Jubilee movement toward the poor and excluded, establishing the narrative direction that reaches the healing of the nations."},{"day":"Friday","n":7,"ref":"Acts 2:42–47","exegetical":"How does Pentecost generate a community of teaching, table fellowship, prayer, and material sharing?","hermeneutical":"How do economic solidarity and fellowship challenge hyper-individualism and consumerism?","integration":"How does deSilva show that this koinonia dismantles patron-client and honor-shame hierarchies?","model":"Spirit-filled fellowship becomes visible in shared tables and resources, forming a new kinship that refuses the dependency and status logic of Roman patronage."},{"day":"Friday","n":8,"ref":"Galatians 2:15–21","exegetical":"How does justification through the faith of Christ sever covenant membership from ethnic boundary markers?","hermeneutical":"How does being crucified with Christ challenge individualized religion and demand participatory union?","integration":"How does this passage connect Acts' boundary crossing with Revelation 7's multi-ethnic multitude?","model":"Justification by Christ's faithfulness removes ethnic status as the basis of belonging and forms the one multi-ethnic family gathered before the Lamb."},{"day":"Friday","n":9,"ref":"1 Peter 2:4–10","exegetical":"How do exodus and temple motifs reconstruct displaced Gentile Christians as chosen race and royal priesthood?","hermeneutical":"How can an alienated church endure without assimilation or retaliation?","integration":"How does Brown's Early Catholicism lens clarify the theological stabilization of second-generation communities?","model":"Israel's sacred titles stabilize alienated believers as a priestly people whose identity and vocation are disclosed through faithful endurance."},{"day":"Friday","n":10,"ref":"Revelation 22:1–5","exegetical":"How do the river and tree of life reverse Eden's curse and complete the Genesis-Revelation canonical arch?","hermeneutical":"How does the promise of seeing God's face sustain holiness, justice, and endurance amid present tragedy?","integration":"How does this final vision synthesize Gospel inauguration, Acts expansion, and Epistle formation?","model":"The river and tree of life complete the canonical movement: the kingdom inaugurated in Jesus, expanded by the Spirit, and embodied by the churches culminates in the healing of the nations."}],"scholars":[["Raymond E. Brown","Historical-critical anchor: Revelation as immediate first-century literature addressing persecution and assimilation."],["David A. deSilva","Socio-rhetorical lens on imperial cult economics, trade guilds, honor, shame, and costly refusal."],["N. T. Wright & Michael F. Bird","Covenantal kingdom narrative: Jesus is Lord, Caesar is not; New Jerusalem descends to renewed earth."],["Luke Timothy Johnson","Lived faith and symbolic formation: visionary rhetoric trains communities for endurance and witness."],["Joel B. Green","The boule tou theou and narrative formation connect Jubilee, mission to the margins, and canonical completion."],["Bart D. Ehrman","Historical diversity and trauma keep Revelation's marginalized human setting visible."],["D. A. Carson & Douglas J. Moo","Apostolic authorship tradition and canonical integrity anchor Revelation as authoritative prophetic witness."]],"glossary":[["Apokalypsis · Apocalypse","Unveiling or disclosure: seeing present reality from heaven's perspective, not merely predicting the future."],["Immediate Literature","Brown's description of Revelation as literature addressing its first-century audience's immediate crisis."],["Imperial Cult","Civic and religious veneration of the emperor intertwined with economics and public belonging."],["Domitian","Roman emperor commonly associated with Revelation's late-first-century setting (AD 92–96)."],["Babylon","Revelation's prophetic unveiling of Rome as exploitative, idolatrous empire."],["New Jerusalem","The city descending from God, joining heaven and renewed earth."],["Nikaō · Conquer","Victory redefined by the slaughtered Lamb and faithful witness rather than coercion."],["Arnion · Lamb","Revelation's central image of Christ: standing, sovereign, and permanently marked by slaughter."],["Hypomonē · Endurance","Active, sustained resistance without assimilation or retaliation."],["Martyria · Testimony","Faithful truth-telling that remains loyal to Jesus regardless of cost."],["Mark of the Beast","A symbol of economic and civic participation conditioned on imperial allegiance."],["Progressive Recapitulation","The seals, trumpets, and bowls revisit the same conflict from intensifying perspectives."],["Boule tou theou","The plan of God enacted through the biblical narrative and formation of its participants."],["Koinonia","Spirit-generated fellowship expressed in shared teaching, table, prayer, and material life."],["Pistis Christou","Pauline phrase translated as faith in Christ or the faithfulness of Christ."],["Jubilee","Release, restoration, and good news to the poor shaping Jesus' mission."],["Canonical Synthesis","Reading Gospels, Acts, Epistles, and Revelation as inauguration, expansion, formation, and consummation."],["Maranatha","Aramaic prayer of eschatological hope: Our Lord, come."]],"quiz":[{"q":"Why must Revelation first be read as a letter?","choices":["It has no symbolic imagery","It names a sender, seven churches, and an immediate occasion","It was written in the 21st century","It rejects prophecy"],"a":1,"explain":"Revelation is apocalypse and prophecy, but also an epistle addressed to seven real churches."},{"q":"What dual crisis governs Revelation's pastoral strategy?","choices":["Persecution and assimilation","Circumcision and food laws","Temple tax and pilgrimage","Language and translation"],"a":0,"explain":"The visions console persecuted churches and diagnose comfortable, assimilating churches."},{"q":"What does the beast's mark primarily symbolize in its first-century setting?","choices":["A modern microchip","Economic and civic participation conditioned on imperial allegiance","Christian baptism","A private mystical experience"],"a":1,"explain":"Imperial cult participation was intertwined with buying, selling, guilds, and civic honor."},{"q":"How is nikaō redefined?","choices":["By Roman military conquest","By wealth accumulation","By the slaughtered Lamb and faithful testimony","By withdrawal from history"],"a":2,"explain":"The Lamb conquers through self-giving suffering, and the saints conquer through his blood and their testimony."},{"q":"What is the direction of New Jerusalem's movement?","choices":["Earth to heaven","Heaven down to renewed earth","Rome to Patmos","Jerusalem to Babylon"],"a":1,"explain":"The city descends; the end is renewed creation, not escape from material existence."},{"q":"How do seals, trumpets, and bowls function?","choices":["As three unrelated timelines","As progressive recapitulations of the same conflict","As Roman tax records","As direct quotations of Genesis"],"a":1,"explain":"They revisit and intensify the same theological crisis from different visionary angles."},{"q":"What are the four canonical movements?","choices":["Law, Wisdom, Prophecy, Gospel","Creation, Fall, Israel, Church","Inauguration, Expansion, Formation, Consummation","Faith, Hope, Love, Peace"],"a":2,"explain":"Gospels inaugurate, Acts expands, Epistles form, and Revelation consummates."},{"q":"How should Romans 13 and Revelation 13 be held together?","choices":["One cancels the other","All states are always demonic","Government may serve good, but worship demands trigger resistance","Christians must ignore public life"],"a":2,"explain":"Revelation identifies the theological boundary of state authority when it demands ultimate allegiance."},{"q":"What is hypomonē?","choices":["Passive resignation","Active sustained resistance without assimilation or retaliation","End-times calculation","Economic success"],"a":1,"explain":"Endurance holds faithful identity under pressure."},{"q":"What is the final embodied aim?","choices":["Mastering a prediction chart","Escaping community","Living Gospel mercy, Acts courage, cruciform love, and Revelation hope","Winning political control"],"a":2,"explain":"Canonical synthesis becomes biography and communal practice."}]},"ko":{"ui":{"course":"성경의 이해","week":"15주차 — 요한계시록과 신약성경 정경 종합","title":"제국을 드러내고, 인내를 형성하며, 만물을 새롭게 하다","eyebrow":"수업 전 적응학습 · UB 15주차","tagline":"죽임당한 어린양은 바벨론 안에서 증언하는 백성을 어떻게 형성하며 새 예루살렘은 어떻게 내려오는가?","heroClaim":"요한계시록은 1세기 제국을 드러내고 대가를 치르는 인내를 형성하며, 하나님 나라의 시작에서 우주적 갱신에 이르는 신약성경의 움직임을 완성한다.","formationAim":"요한계시록을 박해와 동화 위기에 놓인 실제 교회들을 위한 묵시·예언·서신으로 읽고, 삶으로 구현되는 증언을 통해 정경의 흐름을 종합한다.","method":"본문 세계 안에서 시작한다. 1세기 소아시아, 황제 숭배 경제, 다니엘적 이미지, 어린양의 십자가적 승리를 읽고 WHERE–WHO–WHAT에서 EMBODIED 실천으로 이동한다.","threshold":"바벨론에 대한 한 가지 드러냄, 어린양에 대한 한 가지 환상, 하나의 정경적 움직임, 한 가지 구체적인 hypomonē 실천을 능동학습으로 가져간다.","formationAimTitle":"형성 목표","methodTitle":"핵심 방법","thresholdTitle":"문턱 산출물","stats":{"parts":9,"coreTexts":10,"scholars":7,"glossary":18},"statLabels":["학습 패널","핵심 본문","학자 목소리","용어"],"navKicker":"적응학습","navHelp":"한 번에 한 패널씩 읽으세요. 주해가 해석학보다 먼저입니다.","prev":"이전","next":"다음","mark":"읽음 표시","print":"인쇄 / PDF 저장","reset":"초기화","complete":"완료","coreTextSet":"핵심 본문 세트","tuesday":"화요일 · 요한계시록","friday":"금요일 · 정경 종합","exe":"주해 질문","her":"해석학 질문","integration":"통합 질문","model":"모델 움직임 문장","grade":"퀴즈 채점","correct":"정답. ","review":"복습: ","score":"점수","reflectionTitle":"문턱 성찰","reflectionHelp":"능동학습으로 가져갈 내용을 작성하세요.","r1":"바벨론에 대한 한 가지 드러냄","r2":"사자와 어린양 사이의 한 가지 긴장","r3":"해결되지 않은 정경적 질문 하나","r4":"증언 또는 인내의 구체적 실천 하나","submitTitle":"제출 / 내보내기","submitHelp":"로컬로 내보내거나 PDF로 인쇄하여 제출하세요.","student":"학생 이름","sid":"학번","class":"수업","export":"성찰 JSON 내보내기","copy":"JSON 복사","placeholder":"내보내기 결과가 여기에 표시됩니다","search":"용어 검색","quizHelp":"수업 전 자기 점검으로 사용하세요.","footer":"UB 15주차 적응학습 · 요한계시록과 정경 종합 · 김여호수아"},"modules":[{"id":"landing","label":"시작","subtitle":"안내와 형성 목표"},{"id":"overview","label":"개요","subtitle":"1부 · 화요일/금요일 이중 구조"},{"id":"context","label":"역사·문학","subtitle":"2부 · 도미티아누스, 황제 숭배, 묵시"},{"id":"emic","label":"WHERE · WHO · WHAT","subtitle":"3부 · 두 도성, 어린양 정체성, 충실한 증언"},{"id":"themes","label":"주요 주제","subtitle":"4부 · 주권, 인내, 갱신"},{"id":"canonical","label":"비교·정경","subtitle":"5부 · 창세기, 바울, 국가 권력"},{"id":"scholars","label":"학자 매트릭스","subtitle":"6부 · 생산적 긴장 속의 일곱 목소리"},{"id":"logic","label":"내적 논리","subtitle":"7부 · 반복 재현과 네 정경 운동"},{"id":"texts","label":"핵심 본문","subtitle":"화요일 5본문 · 금요일 5본문"},{"id":"synthesis","label":"형성과 결론","subtitle":"WHERE → WHO → WHAT → EMBODIED"},{"id":"glossary","label":"용어","subtitle":"15주차 핵심 용어"},{"id":"quiz","label":"퀴즈","subtitle":"수업 전 자기 평가"},{"id":"reflection","label":"성찰","subtitle":"능동학습으로 가는 문턱"},{"id":"submit","label":"제출 / 내보내기","subtitle":"로컬 내보내기와 PDF"}],"moduleHtml":{"overview":"<h3>1. 주간 개요</h3><p>15주차는 마지막 정경적 문턱이다. 화요일에는 요한계시록을 일곱 1세기 교회를 위한 즉각적 목회 문헌으로 읽는다. 금요일에는 신약성경 전체를 네 운동으로 종합한다. 복음서의 하나님 나라 시작, 사도행전의 성령에 의한 확장, 서신서의 십자가적 공동체 형성, 요한계시록의 우주적 완성이다.</p><h4>이중 위기</h4><p>서머나와 버가모는 박해, 배제, 순교에 직면한다. 사데와 라오디게아는 안락과 동화라는 조용한 위험에 놓인다. 동일한 묵시적 드러냄이 박해받는 이들을 위로하고 편안한 이들을 진단한다.</p><div class='text-card'><strong>EMBODIED:</strong> 지금 당신의 궁극적 충성을 요구하는 경제적·이념적·디지털·제도적 체계를 명명하라.</div>","context":"<h3>2. 역사·문학적 맥락</h3><h4>밧모섬과 도미티아누스</h4><p>요한계시록은 흔히 주후 92–96년으로 연대가 설정된다. 요한은 박해와 나라와 인내에 함께 참여하는 형제로 밧모섬에서 쓴다. 사도 요한 전통과 선견자 요한 사이의 저작권 논쟁은 중요하지만, 본문은 환상과 증언과 함께 겪는 고난에 권위를 둔다.</p><h4>황제 숭배 경제</h4><p>소아시아에서 황제 숭배, 시민적 명예, 직업 조합 참여는 서로 얽혀 있었다. 거부는 불매와 수치를 초래할 수 있었다. 짐승의 표는 현대의 마이크로칩이 아니라 카이사르 충성을 조건으로 하는 참여를 상징한다.</p><h4>혼합 장르</h4><p>요한계시록은 묵시, 예언, 서신이다. 다니엘, 에스겔, 이사야, 스가랴, 출애굽기의 이미지 안에 거한다. 문자주의적 암호 해독은 이 상징 세계를 파괴한다.</p>","emic":"<h3>3. 에믹 재구성</h3><h4>WHERE — 바벨론과 새 예루살렘</h4><p>열린 문은 요한을 보좌의 관점으로 들어 올린다. 로마는 바벨론으로 폭로되고, 새 예루살렘은 도피자를 받아들이는 곳이 아니라 내려오는 도성이다. 하늘은 땅을 치유한다.</p><h4>WHO — 이기는 자들</h4><p>사자는 죽임당한 모습으로 서 있는 어린양으로 보인다. 신자들도 동일한 패턴으로 이긴다. 어린양의 피, 진실한 증언, 생존을 최고의 가치로 붙들지 않음이다.</p><h4>WHAT — Hypomonē, Martyria, Apokalypsis</h4><p>인내는 능동적 저항이고, 증언은 대가를 치르는 진실 말하기이며, 묵시는 이미 참된 현실을 드러내는 것이다.</p><div class='text-card'><strong>EMBODIED:</strong> 어린양에 대한 충성을 보이게 할 구체적인 거부 하나를 찾으라.</div>","themes":"<h3>4. 주요 주제</h3><h4>하나님과 어린양의 주권</h4><p>카이사르의 권력은 모방으로 폭로된다. 어린양은 자기희생적 고난으로 이긴다.</p><h4>증언과 인내</h4><p>요한계시록은 날짜 계산을 훈련하지 않는다. martyria와 hypomonē를 형성한다.</p><h4>갱신을 향한 심판</h4><p>인, 나팔, 대접은 억압적 권력을 해체하여 죽음, 애통, 울음, 고통이 끝나게 한다.</p><h4>정경적 하나님 나라 운동</h4><p>복음서는 시작하고, 사도행전은 확장하며, 서신서는 형성하고, 요한계시록은 완성한다.</p>","canonical":"<h3>5. 비교·정경 관계</h3><h4>창세기와 요한계시록</h4><p>뱀은 패배하고 저주는 제거되며 생명나무는 회복된다. 낙원은 단순히 복구되는 것이 아니라 하나님이 인류와 함께 거하시는 도성-동산이 된다.</p><h4>바울과 요한</h4><p>바울은 능력이 약함 안에서 온전해진다고 논증하고, 요한은 사자가 죽임당한 어린양임을 보여 준다. 논증과 환상은 서로를 필요로 한다.</p><h4>로마서 13장과 요한계시록 13장</h4><p>국가는 혼돈을 억제할 수 있지만 숭배를 요구할 때 복종은 신학적 한계에 이르고 충실한 저항이 시작된다.</p>","scholars":"<h4>생산적 긴장</h4><p>Brown은 요한계시록이 무엇을 의미했는지 역사에 고정하고, deSilva는 그 수사가 청중에게 무엇을 했는지 묻는다. Wright와 Bird는 정치적·언약적 갱신을, Johnson은 목회적 형성을 강조한다. Ehrman은 역사적 트라우마와 다양성을 보존하고, Carson과 Moo는 본문의 사도적·정경적 주장을 보존한다. Green은 하나님의 내러티브 계획으로 전체 움직임을 연결한다.</p>","logic":"<h3>7. 내적 논리</h3><p>요한계시록은 선형적 종말 시간표가 아니다. 일곱 인, 나팔, 대접은 같은 갈등을 더 깊어지는 관점에서 점진적으로 반복한다. 1–3장은 지상의 위기, 4–5장은 보좌와 어린양, 6–16장은 심판, 17–19장은 바벨론의 폭로와 패배, 21–22장은 새 창조를 드러낸다.</p><h4>정경적 논리</h4><p>복음서: 구심적 성육신. 사도행전: 원심적 성령 선교. 서신서: 형성적 공동체. 요한계시록: 종말론적·우주적 해결.</p>","texts":"<h3>8. 핵심 본문 세트</h3><p>화요일에는 요한계시록의 본문 세계 안으로 들어간다. 금요일에는 요한계시록이 완성하는 정경적 움직임을 추적한다. 주해에서 해석학으로, 통합을 통해 이동하라.</p>","synthesis":"<h3>9. 신학적·형성적 종합</h3><p>요한계시록은 바벨론 안에서 새 예루살렘의 전초기지로 살아가는 절대 충성의 공동체를 형성한다. 폭력적 보복과 편안한 동화를 모두 거부한다.</p><h4>일곱 교회에서 나온 정의 진단</h4><p><strong>CLOSED WOMB:</strong> 제국 구조가 서머나와 빌라델비아의 드러난 존엄을 묻는다. <strong>PREMATURE EXPULSION:</strong> 니골라당과 이세벨의 목소리가 정체성을 우상 체계 안으로 강제한다. <strong>KAIROS THEFT:</strong> 라오디게아의 부가 제국의 안락으로 형성을 대체한다.</p><h4>최종 형성</h4><p>정경은 복음서의 자비, 사도행전의 용기, 서신서의 십자가적 사랑, 요한계시록의 소망을 구현하는 사람들을 형성한다. 정경은 닫혔지만 선교는 계속된다.</p><div class='text-card'><strong>EMBODIED:</strong> 이번 주 고난받거나 안일한 한 관계의 장에 강의가 아니라 진실한 증언을 가져가라.</div>"},"coreTexts":[{"day":"화요일","n":1,"ref":"요한계시록 1:9–20","exegetical":"요한은 다니엘 7장의 인자와 옛적부터 항상 계신 이의 이미지를 어떻게 재구성하여 밧모섬 유배 위에 계신 부활한 그리스도의 신적 권위를 드러내는가?","hermeneutical":"고난받는 교회는 예수를 단순한 도덕 교사가 아니라 역사의 주권적 주님으로 어떻게 다시 보아야 하는가?","integration":"도미티아누스 치하의 1세기 상황을 강조하는 Brown의 관점은 이 환상을 먼 미래의 시간표로 오독하지 않도록 어떻게 돕는가?","model":"도미티아누스 제국 세계 안에서 인자의 환상은 먼 미래의 암호가 아니라, 카이사르가 아닌 그리스도께서 역사를 다스리심을 유배된 교회에 확신시키는 즉각적인 목회적 드러냄이다."},{"day":"화요일","n":2,"ref":"요한계시록 4:1–11","exegetical":"하늘의 열린 문을 통해 요한이 들려 올라가는 공간 이동은 로마 제국의 압도적으로 보이는 권력을 어떻게 상대화하는가?","hermeneutical":"정치·경제 초강대국의 지배 속에서 공동 예배는 어떻게 창조주께만 충성을 선언하는 전복적 행위가 될 수 있는가?","integration":"보좌 환상은 지상의 예배를 하늘의 예배와 일치시킴으로 Johnson의 살아낸 믿음을 어떻게 구현하는가?","model":"보좌의 관점은 예배를 살아낸 저항으로 형성하며, 모든 지상 제국의 권력은 파생적이고 주권은 창조주께만 있음을 드러낸다."},{"day":"화요일","n":3,"ref":"요한계시록 5:1–14","exegetical":"죽임당한 모습으로 서 있는 어린양과 십자가의 영구한 상처는 이김(nikaō)의 의미를 어떻게 재정의하는가?","hermeneutical":"십자가적 승리는 강압적 정치 권력에 끌리는 현대 그리스도교를 어떻게 도전하는가?","integration":"요한의 사자/어린양 환상은 약함 안에서 온전해지는 능력에 대한 바울 신학을 어떻게 상징적 언어로 번역하는가?","model":"영구한 상처를 지닌 어린양은 십자가 신학을 묵시적 환상으로 번역한다. 하나님은 강압적 폭력이 아니라 자기희생적 사랑으로 체계적 악을 이기신다."},{"day":"화요일","n":4,"ref":"요한계시록 12:1–12","exegetical":"여인, 아이, 광야, 용의 이미지는 교회의 지상 고난이 지닌 우주적 차원을 어떻게 드러내는가?","hermeneutical":"어린양의 피와 충실한 증언으로 얻는 승리는 보복이 아니라 비폭력적 예언자 증언을 어떻게 요구하는가?","integration":"deSilva의 사회수사학은 황제 숭배 참여를 거부한 신자들이 받은 경제적·시민적 압력을 어떻게 밝혀 주는가?","model":"우주적 전쟁은 제국 압력의 사회적 현실을 명명하며, 성도들은 어린양이 이루신 승리와 대가를 치르는 비폭력적 증언으로 이긴다."},{"day":"화요일","n":5,"ref":"요한계시록 21:1–6","exegetical":"새 예루살렘이 하늘에서 내려오는 공간 이동은 비물질적 내세로의 도피 관념을 어떻게 전복하는가?","hermeneutical":"새롭게 된 땅에 하나님이 거하신다는 약속은 오늘 생태적 돌봄과 사회 정의를 어떻게 요구하는가?","integration":"이 하강은 Wright의 언약적 하나님 나라 이야기와 아브라함에게 주신 열방 축복의 약속을 어떻게 완성하는가?","model":"내려오는 도성은 하늘과 새롭게 된 땅을 결합하여 하나님 나라 이야기를 완성하고, 교회가 지금 물질적·관계적 회복을 미리 살아내도록 형성한다."},{"day":"금요일","n":6,"ref":"누가복음 4:16–21","exegetical":"이사야 61장과 58장의 인용은 희년을 예수의 사역과 누가-행전의 프로그램으로 어떻게 세우는가?","hermeneutical":"교회는 가난과 주변화를 지속시키는 구조에 대한 자신의 공모를 어떻게 평가해야 하는가?","integration":"Green의 boule tou theou 관점은 나사렛 선언을 주변부를 향한 운동과 새 예루살렘에 어떻게 연결하는가?","model":"나사렛 선언은 가난하고 배제된 이들을 향한 희년 운동을 시작하며, 열방의 치유에 이르는 정경 이야기의 방향을 세운다."},{"day":"금요일","n":7,"ref":"사도행전 2:42–47","exegetical":"오순절 성령 강림은 가르침, 식탁 교제, 기도, 물질 나눔의 공동체를 어떻게 생성하는가?","hermeneutical":"경제적 연대와 공동체적 교제는 극단적 개인주의와 소비주의를 어떻게 도전하는가?","integration":"deSilva의 관점에서 이 코이노니아는 후원-피후원과 명예-수치 위계를 어떻게 해체하는가?","model":"성령 충만한 교제는 식탁과 자원의 나눔으로 보이며, 로마 후원 체계의 의존과 지위 논리를 거부하는 새로운 친족 공동체를 형성한다."},{"day":"금요일","n":8,"ref":"갈라디아서 2:15–21","exegetical":"그리스도의 믿음/신실함을 통한 칭의는 언약 공동체의 자격을 민족적 경계 표지에서 어떻게 분리하는가?","hermeneutical":"그리스도와 함께 십자가에 못 박혔다는 고백은 개인화된 종교를 어떻게 도전하고 참여적 연합을 요구하는가?","integration":"이 본문은 사도행전의 경계 넘기와 요한계시록 7장의 다민족 무리를 어떻게 연결하는가?","model":"그리스도의 신실함에 의한 칭의는 민족적 지위를 소속의 기초에서 제거하고 어린양 앞에 모이는 하나의 다민족 가족을 형성한다."},{"day":"금요일","n":9,"ref":"베드로전서 2:4–10","exegetical":"출애굽과 성전 모티프는 이주되고 고난받는 이방인 그리스도인들을 택한 족속과 왕 같은 제사장으로 어떻게 재구성하는가?","hermeneutical":"소외된 교회는 동화되거나 보복하지 않고 어떻게 견딜 수 있는가?","integration":"Brown의 초기 보편교회화 관점은 2세대 공동체의 신학적 안정화를 어떻게 설명하는가?","model":"이스라엘의 거룩한 칭호들은 소외된 신자들을 제사장 백성으로 안정시키며, 그들의 정체성과 소명이 신실한 인내를 통해 드러나게 한다."},{"day":"금요일","n":10,"ref":"요한계시록 22:1–5","exegetical":"생명수의 강과 생명나무는 에덴의 저주를 어떻게 역전하고 창세기-요한계시록의 정경적 아치를 완성하는가?","hermeneutical":"하나님의 얼굴을 본다는 약속은 현재의 비극 속에서 거룩, 정의, 인내를 어떻게 지탱하는가?","integration":"이 마지막 환상은 복음서의 시작, 사도행전의 확장, 서신서의 형성을 어떻게 종합하는가?","model":"생명수와 생명나무는 정경의 움직임을 완성한다. 예수 안에서 시작되고 성령으로 확장되며 교회가 구현한 하나님 나라는 열방의 치유로 완성된다."}],"scholars":[["Raymond E. Brown","역사비평적 기준점: 요한계시록을 박해와 동화 위기에 응답하는 1세기 즉각적 문헌으로 읽는다."],["David A. deSilva","황제 숭배 경제, 직업 조합, 명예와 수치, 대가를 치르는 거부를 밝히는 사회수사학적 렌즈."],["N. T. Wright & Michael F. Bird","언약적 하나님 나라 이야기: 예수는 주님이고 카이사르는 아니며, 새 예루살렘은 새롭게 된 땅으로 내려온다."],["Luke Timothy Johnson","살아낸 믿음과 상징적 형성: 환상적 수사가 공동체를 인내와 증언으로 훈련한다."],["Joel B. Green","boule tou theou와 내러티브 형성을 통해 희년, 주변부 선교, 정경의 완성을 연결한다."],["Bart D. Ehrman","초기 그리스도교의 다양성과 트라우마를 통해 요한계시록의 주변화된 인간 현실을 보존한다."],["D. A. Carson & Douglas J. Moo","사도적 저작 전통과 정경적 통일성을 통해 요한계시록을 권위 있는 예언자적 증언으로 읽는다."]],"glossary":[["아포칼립시스 · 묵시","감추어진 현실을 드러내는 것. 미래 예측보다 하늘의 관점에서 현재를 보게 한다."],["즉각적 문헌","요한계시록을 1세기 청중의 당면 위기에 응답하는 문헌으로 읽는 Brown의 표현."],["황제 숭배","경제와 시민적 소속에 결합된 황제에 대한 종교적·공적 숭배."],["도미티아누스","요한계시록의 후기 1세기 배경(주후 92–96년)과 흔히 연결되는 로마 황제."],["바벨론","로마를 착취적이고 우상숭배적인 제국으로 드러내는 요한계시록의 예언자적 이름."],["새 예루살렘","하나님께로부터 내려와 하늘과 새롭게 된 땅을 결합하는 도성."],["Nikaō · 이기다","강압이 아니라 죽임당한 어린양과 충실한 증언으로 재정의된 승리."],["Arnion · 어린양","서 있고 주권을 가지며 죽임의 흔적을 영구히 지닌 그리스도의 중심 이미지."],["Hypomonē · 인내","동화되거나 보복하지 않는 능동적이고 지속적인 저항."],["Martyria · 증언","대가와 상관없이 예수께 충실하게 남는 진실 말하기."],["짐승의 표","제국에 대한 충성을 조건으로 하는 경제적·시민적 참여의 상징."],["점진적 반복 재현","인, 나팔, 대접이 같은 갈등을 점점 심화되는 관점에서 반복해 보여 주는 구조."],["Boule tou theou · 하나님의 계획","성경 이야기와 참여자의 형성을 통해 실행되는 하나님의 계획."],["Koinonia · 코이노니아","가르침, 식탁, 기도, 물질 생활의 나눔으로 표현되는 성령이 만든 교제."],["Pistis Christou","그리스도를 믿는 믿음 또는 그리스도의 신실함으로 번역되는 바울의 표현."],["희년","예수의 사역을 형성하는 해방, 회복, 가난한 자에게 전해지는 좋은 소식."],["정경적 종합","복음서, 사도행전, 서신서, 요한계시록을 시작, 확장, 형성, 완성으로 함께 읽는 것."],["마라나타","종말론적 소망의 아람어 기도: 우리 주여, 오시옵소서."]],"quiz":[{"q":"왜 요한계시록을 먼저 서신으로 읽어야 하는가?","choices":["상징 이미지가 없기 때문에","발신자     <h2>Lecture Manuscript</h2>
    <p class="muted">Tuesday: The Apocalypse of John · Friday: The New Testament as Canonical Symphony</p>

    <h3>Tuesday Session — The Apocalypse of John: Unveiling Empire, Forming Endurance</h3>

    <h4>I. You Are Holding a Letter</h4>
    <p>Before we open Revelation, notice how the book describes itself: “John to the seven churches that are in Asia” (Rev 1:4). Revelation is an epistle. It has a sender, recipients, and an occasion. Whatever else it is—vision, prophecy, and apocalypse—it is first a piece of mail intended to be read aloud to real communities.</p>
    <p>John does not write to us first. He writes to believers in Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, and Laodicea. We read over their shoulders. If we make ourselves the primary audience, Revelation quickly becomes a codebook for contemporary headlines rather than immediate pastoral literature for first-century churches.</p>
    <p>Raymond E. Brown’s historical-critical discipline therefore gives us a necessary starting point: understand what Revelation disclosed to its original recipients about their present before asking what it says to later readers.</p>

    <h4>II. The Squeeze</h4>
    <p>The churches of Asia Minor live inside a double pressure. The Roman Empire presents military power, economic wealth, and civic order as divine gifts. Emperor veneration and trade-guild participation are woven into public belonging. David A. deSilva helps us see that refusing the imperial cult could mean economic exclusion, political suspicion, and public shame.</p>
    <p>Yet persecution is only one side of the crisis. In Sardis and Laodicea, the deeper danger is comfort. Believers attend guild banquets, accumulate wealth, and learn to participate in imperial life without feeling the contradiction. Revelation addresses persecution and assimilation with the same pastoral instrument: apocalyptic unveiling. It consoles the suffering and exposes the comfortable.</p>

    <h4>III. Come Up Here</h4>
    <p>Revelation 4:1 establishes the book’s interpretive posture: an open door appears in heaven and John hears, “Come up here.” The movement is not geographical escape. It is a relocation of perception. From the marketplace, Caesar appears omnipotent. From the throne room, imperial power becomes derivative and temporary.</p>
    <p>John hears that the Lion of Judah has conquered, but when he turns, he sees a Lamb standing as if slaughtered. This is Revelation’s central christological and political shock. The true Lord conquers not by inflicting violence but by absorbing it. The Lamb’s wounds remain visible in heaven. N. T. Wright and Michael F. Bird clarify the political confession: Jesus is Lord, therefore Caesar is not. Yet Jesus’ lordship permanently rebukes every coercive imitation of imperial power.</p>

    <h4>IV. Unmasking Babylon</h4>
    <p>The seals, trumpets, and bowls perform a sustained act of unmasking. Rome calls itself the guarantor of civilization and peace; John names it Babylon, the empire that exploits nations, demands worship, and sheds the blood of the saints. The shocking imagery is designed to break the spell of imperial affluence.</p>
    <p>“Come out of her, my people” (Rev 18:4) is not merely geographic withdrawal. It demands economic, liturgical, and political differentiation. The community cannot eat at the Lamb’s table while organizing its loyalty around the beast’s table.</p>

    <h4>V. How They Conquered</h4>
    <p>Revelation 12:11 names the church’s weapons: the blood of the Lamb, the word of their testimony, and the refusal to make survival the supreme value. The Lamb’s victory is accomplished; the community’s testimony is ongoing and costly.</p>
    <p>Luke Timothy Johnson reminds us that the visions are pastoral formation. By repeatedly shifting attention from earthly suffering to heavenly worship, Revelation trains the imagination to see from the throne room rather than from the marketplace. The visions are not puzzles to decode but a world to inhabit faithfully.</p>

    <h4>VI. How It Ends</h4>
    <p>The story does not end with the church escaping into a disembodied heaven. New Jerusalem comes down. God moves toward earth, the curse is removed, the tree and river of life return, and the nations walk by the Lamb’s light. Heaven does not discard creation; it heals it.</p>
    <blockquote>The movement is downward, not upward. The Christian hope is not escape from history but the final redemption of creation.</blockquote>

    <div class="text-card"><strong>EMBODIED PRACTICE:</strong> Identify one place where comfort or fear is shaping your allegiance. Name one concrete act of hypomonē—faithful endurance without assimilation or retaliation.</div>

    <h3>Friday Session — The New Testament as Canonical Symphony</h3>

    <h4>VII. Arriving at the Destination</h4>
    <p>We do not begin again. We arrive. Fifteen weeks of study prepare us to ask about the shape of the whole New Testament. The answer is not merely a list of doctrines. It is a movement—a story in four movements, each generating the next and remaining incomplete without what follows.</p>

    <h4>VIII. The Four Movements</h4>
    <h4>Movement One: Inauguration — The Gospels</h4>
    <p>Jesus moves from Galilee’s margins toward Jerusalem, announcing and embodying God’s Kingdom among the poor, excluded, sick, and socially condemned. The King is enthroned on a Roman cross and vindicated through bodily resurrection. Joel B. Green’s boule tou theou shows that the Nazareth Jubilee manifesto is the narrative logic of this movement toward the margins.</p>

    <p>The ascension and Pentecost turn the movement from centripetal to centrifugal. The Spirit drives the witnesses from Jerusalem through Judea and Samaria toward the ends of the earth. Ethnic boundaries are crossed, and a new Jew-Gentile humanity emerges through grace rather than Mosaic boundary markers.</p>

    <h4>Movement Three: Formation — The Epistles</h4>
    <p>The Epistles enter the daily work of forming this diverse family inside the Roman world. Justification by grace dismantles status-based belonging. Paul forms cruciform communities; James demands economic justice; Peter stabilizes marginalized believers as a royal priesthood. Theology becomes communal architecture.</p>

    <h4>Movement Four: Consummation — Revelation</h4>
    <p>Revelation provides the horizon that makes endurance possible. The Kingdom inaugurated in Jesus, expanded through the Spirit, and embodied in the churches reaches cosmic completion. Babylon falls, New Jerusalem descends, the nations are healed, and God dwells with humanity.</p>

    <blockquote>The canon is closed, but the mission continues. Every generation is invited to embody the mercy of the Gospels, the courage of Acts, the cruciform love of the Epistles, and the eschatological hope of Revelation.</blockquote>

    <h2>강의 원고</h2>

    <h4>I. 당신은 한 통의 편지를 들고 있다</h4>

    <p>Luke Timothy Johnson은 이 환상들이 목회적 형성임을 상기시킨다. 요한계시록은 독자의 시선을 땅의 고난에서 하늘 보좌의 예배로 반복해서 이동시킴으로, 시장이 아니라 보좌에서 세상을 바라보도록 상상력을 훈련한다. 환상은 풀어야 할 수수께끼가 아니라 신실하게 거주해야 할 세계이다.</p>

  setText('submitHelp', UI().submitHelp);
  setText('studentLabel', UI().student); setText('sidLabel', UI().sid); setText('classLabel', UI().class);
  setText('exportBtn', UI().export); setText('copyBtn', UI().copy); setText('printBtn2', UI().print);
  $('exportOut').placeholder = UI().placeholder;
}

function exportPayload() {
  const payload = {
    course: UI().course, week: UI().week, topic: UI().title, language: lang,
    studentName: $('student').value, studentId: $('sid').value, className: $('cls').value,
    reflection: { insight: $('r1').value, tension: $('r2').value, question: $('r3').value, movement: $('r4').value },
    completedPanels: done, exportedAt: new Date().toISOString()
  };
  $('exportOut').value = JSON.stringify(payload, null, 2);
  markDone('submit');
  return payload;
}

function showPanel(id) {
  current = id;
  save();
  document.querySelectorAll('main>section').forEach(s => s.classList.toggle('active-section', s.id===id));
  const idx = modules().findIndex(m => m.id === id);
  const m = modules()[idx] || modules()[0];
  setText('panelTitle', m.label);
  setText('panelSubtitle', m.subtitle);
  $('panelPrev').disabled = idx <= 0;
  $('panelNext').disabled = idx >= modules().length - 1;
  renderNav();
  updateProgress();
  const main = document.querySelector('main');
  if(main) main.scrollTop = 0;
}

function updateProgress() {
  const pct = Math.round((done.length / modules().length) * 100);
  $('bar').style.width = pct + '%';
  $('pct').textContent = `${pct}% ${UI().complete}`;
}

function resetAll() {
  if(confirm(lang === 'ko' ? '진행 상황을 초기화할까요?' : 'Reset progress?')) {
    Object.keys(localStorage).filter(k => k.startsWith(LS)).forEach(k => localStorage.removeItem(k));
    done=[]; current='landing'; lang='en'; renderAll(); showPanel(current);
  }
}

function renderAll() {
  renderHeader(); renderLanding(); renderNav(); renderModules(); updateProgress();
}

document.addEventListener('DOMContentLoaded', () => {
  $('lang').addEventListener('change', e => { lang = e.target.value; save(); renderAll(); showPanel(current); });
  $('printBtn').addEventListener('click', () => window.print());
  $('printBtn2').addEventListener('click', () => window.print());
  $('resetBtn').addEventListener('click', resetAll);
  $('markBtn').addEventListener('click', () => markDone(current));
  $('panelPrev').addEventListener('click', () => { const idx = modules().findIndex(m => m.id === current); if(idx>0) showPanel(modules()[idx-1].id); });
  $('panelNext').addEventListener('click', () => { const idx = modules().findIndex(m => m.id === current); if(idx < modules().length-1) showPanel(modules()[idx+1].id); });
  $('gradeBtn').addEventListener('click', gradeQuiz);
  $('glossSearch').addEventListener('input', e => renderGlossary(e.target.value));
  $('exportBtn').addEventListener('click', exportPayload);
  $('copyBtn').addEventListener('click', async () => { const p = exportPayload(); try { await navigator.clipboard.writeText(JSON.stringify(p,null,2)); $('copyBtn').textContent = lang === 'ko' ? '복사됨' : 'Copied'; setTimeout(()=>setText('copyBtn', UI().copy), 1200); } catch(e) { $('exportOut').select(); document.execCommand('copy'); } });
  renderAll(); showPanel(current);
});
</script>
</body>
</html>
